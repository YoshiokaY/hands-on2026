name: Lint

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Run Prettier Check
        run: pnpm format:check

      - name: Run Stylelint
        run: pnpm stylelint

      - name: Run Markuplint
        run: pnpm markuplint

      - name: TypeScript Check
        run: pnpm typecheck
